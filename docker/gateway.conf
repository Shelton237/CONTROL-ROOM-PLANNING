# Conf du conteneur "gateway" (docker-compose.prod.yaml). Reçoit le trafic
# relayé par le reverse proxy existant du serveur pour crm.thara-services.mg
# et route /planning vers le frontend ou le backend.

server {
    listen 80;
    server_name _;

    location = /planning {
        return 301 /planning/;
    }

    # /planning/api/* -> backend:80/api/* (le backend ne connait pas /planning)
    location /planning/api/ {
        proxy_pass http://backend:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /planning/* -> frontend:3000 (Next.js a /planning comme basePath, donc
    # le préfixe doit être conservé, pas de réécriture ici)
    location /planning/ {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
