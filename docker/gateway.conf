# Conf du conteneur "gateway" (docker-compose.prod.yaml). Reçoit le trafic
# relayé par le reverse proxy existant du serveur pour crm.thara-services.mg
# et route /planning vers le frontend ou le backend.

server {
    listen 80;
    server_name _;

    # Compression : pas activée par défaut dans l'image nginx:alpine. Réduit
    # le JS/CSS de ~60-75% (le JPG/PNG est déjà compressé, gzip n'aide pas là).
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        font/woff
        font/woff2
        image/svg+xml;

    # /planning/api/* -> backend:80/api/* (le backend ne connait pas /planning)
    location /planning/api/ {
        proxy_pass http://backend:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /planning (avec ou sans slash final) -> frontend:3000. Pas de redirect
    # nginx ici : Next.js (basePath) gère lui-même la normalisation
    # /planning <-> /planning/, un 301 ajouté ici créerait une boucle infinie
    # avec le 308 que Next.js émet déjà pour le même cas.
    location /planning {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
