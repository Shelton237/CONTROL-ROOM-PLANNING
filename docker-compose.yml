# Stack de dev : reproduit le fonctionnement local habituel (php artisan serve
# + npm run dev, sqlite), juste conteneurisé. Code monté en volume (hot
# reload). Lire backend/.env et frontend/.env.local directement depuis le
# disque (rien à dupliquer ici).
#
# Usage : docker compose up --build
#   backend  -> http://localhost:8000
#   frontend -> http://localhost:3000

services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_vendor:
  frontend_node_modules:
